name: CI

# Mock CI/CD pipeline for the AI DevOps Agent.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (mock)
        run: echo "Running lint... (placeholder)"

      - name: Test (mock)
        run: echo "Running tests... (placeholder)"

      - name: Deploy (mock)
        if: github.ref == 'refs/heads/main'
        run: echo "Deploying... (placeholder)"
